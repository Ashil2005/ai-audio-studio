name: audio_studio
description: PocketAudio Studio — AI Knowledge Creation Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Firebase (free Spark plan)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  google_sign_in: ^6.2.1

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilities
  shared_preferences: ^2.3.1
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  uuid: ^4.4.2
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # PDF & Audio
  syncfusion_flutter_pdf: ^24.2.3
  flutter_tts: ^3.8.5
  speech_to_text: ^7.3.0
  just_audio: ^0.9.36
  audio_service: ^0.18.15

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
